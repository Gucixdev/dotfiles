[main]
# THEME:BEGIN font - generowane przez ~/dev/rice/theme/apply, nie edytuj recznie
font=MesloLGM Nerd Font Mono:size=11
# THEME:END font
dpi-aware=yes

[scrollback]
lines=10000

[colors-dark]
# THEME:BEGIN colors - generowane przez ~/dev/rice/theme/apply, nie edytuj recznie
background=000000
foreground=e0e0e0
# THEME:END colors

regular0=1a1a1a
regular1=cc0000
regular2=23fd00
regular3=e6c445
regular4=3584e4
regular5=a347ba
regular6=33c7de
regular7=d0d0d0

bright0=5e5c64
bright1=f66151
bright2=5afe40
bright3=f9f06b
bright4=62a0ea
bright5=c061cb
bright6=5bc8fb
bright7=ffffff

[url]
launch=xdg-open ${url}
osc8-underline=url-mode

[key-bindings]
scrollback-up-page=shift+Page_Up
scrollback-down-page=shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
